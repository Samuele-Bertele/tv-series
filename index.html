  transition: background 0.2s, color 0.2s;
}
.card-menu:hover { background: rgba(0,0,0,0.8); color: #fff; }
.card-menu-box {
  position: absolute;
  background: #1e1e1e;
  border: 1px solid #333;
  padding: 6px;
  border-radius: 8px;
  margin-top: 4px;
  right: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-width: 155px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.6);
}
.card-menu-box button {
  background: rgba(255,255,255,0.06);
  border: none;
  padding: 7px 11px;
  color: white;
  border-radius: 5px;
  cursor: pointer;
  text-align: left;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  gap: 7px;
}
.card-menu-box button:hover { background: rgba(255,255,255,0.12); }
.card-menu-box .delete-btn { color: #ff6b6b; }
.card-menu-box .delete-btn:hover { background: rgba(229,9,20,0.15); }
.card-menu-box .move-submenu {
  position: relative;
}
.card-menu-box .move-submenu-list {
  display: none;
  position: absolute;
  left: calc(100% + 6px);
  top: 0;
  background: #1e1e1e;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 6px;
  min-width: 170px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.7);
  z-index: 20;
  flex-direction: column;
  gap: 4px;
  max-height: 260px;
  overflow-y: auto;
}
.card-menu-box .move-submenu:hover .move-submenu-list { display: flex; }
.card-menu-box .move-submenu-list button {
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-menu-box .move-submenu > button { color: rgba(255,255,255,0.8); }
.card-menu-box .move-submenu > button i { color: #aaa; }

/* testo sovrapposto al poster */
.poster-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 0 10px 10px;
  z-index: 2;
}
.show-title {
  font-size: 13px;
  font-weight: 700;
  line-height: 1.3;
  cursor: pointer;
  color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  transition: color 0.2s;
  margin-bottom: 3px;
}
.show-title:hover { color: var(--accent); }
.show-progress {
  font-size: 11px;
  color: #ff6b6b;
  display: flex;
  align-items: center;
  gap: 4px;
  font-weight: 600;
  text-shadow: 0 1px 3px rgba(0,0,0,0.7);
}
.show-progress::before { content: '●'; font-size: 6px; flex-shrink: 0; }
.show-progress.unseen { color: #666; }
.show-progress.unseen::before { content: '○'; }

/* rating badge */
.rating-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  background: linear-gradient(135deg, rgba(255,215,0,0.18), rgba(255,215,0,0.08));
  border: 1px solid rgba(255,215,0,0.35);
  border-radius: 20px;
  padding: 2px 7px;
  font-size: 10px;
  font-weight: 800;
  color: var(--gold);
  cursor: pointer;
  transition: var(--transition);
  margin-top: 3px;
  width: fit-content;
  position: relative;
}
.rating-badge:hover {
  background: linear-gradient(135deg, rgba(255,215,0,0.3), rgba(255,215,0,0.16));
  border-color: rgba(255,215,0,0.6);
  transform: scale(1.06);
}
.rating-badge i { font-size: 8px; }

/* rating badge tooltip */
.rating-tooltip {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%) scale(0.92);
  background: #1a1a1a;
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 10px;
  padding: 10px 12px;
  min-width: 160px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.18s ease, transform 0.18s ease;
  z-index: 50;
  box-shadow: 0 8px 24px rgba(0,0,0,0.7);
}
.rating-badge:hover .rating-tooltip {
  opacity: 1;
  transform: translateX(-50%) scale(1);
}
.rating-tooltip::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: rgba(255,215,0,0.3);
}
.rating-tooltip-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  padding: 2px 0;
  font-size: 11px;
}
.rating-tooltip-label { color: var(--text-muted); }
.rating-tooltip-val { color: var(--gold); font-weight: 700; font-family: var(--font-display); font-size: 14px; }
.rating-tooltip-divider { height: 1px; background: rgba(255,215,0,0.15); margin: 5px 0; }
.rating-tooltip-avg-row { display: flex; justify-content: space-between; align-items: center; }
.rating-tooltip-avg-label { font-size: 10px; color: rgba(255,215,0,0.6); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.rating-tooltip-avg-val { font-family: var(--font-display); font-size: 20px; color: var(--accent); }

/* ---- ADD SHOW FORM ---- */
.add-show-form { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start; }
.add-show-form input {
  padding: 9px 13px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  transition: var(--transition);
}
.add-show-form input:focus { outline: none; border-color: var(--accent); background: rgba(255,255,255,0.08); }
.add-show-form input::placeholder { color: var(--text-muted); }

/* ---- AUTOCOMPLETE DROPDOWN ---- */
.autocomplete-dropdown {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  background: #1e1e1e;
  border: 1px solid #333;
  border-radius: 8px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.7);
  max-height: 260px;
  overflow-y: auto;
  width: 280px;
  z-index: 30;
  display: none;
}
.autocomplete-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  cursor: pointer;
  transition: background 0.2s;
  color: var(--text);
  font-size: 13px;
}
.autocomplete-item:hover {
  background: rgba(229,9,20,0.12);
}
.autocomplete-item img {
  width: 30px;
  height: 45px;
  object-fit: cover;
  border-radius: 4px;
  background: #2a2a2a;
}
.autocomplete-item small {
  color: var(--text-muted);
  font-size: 11px;
}

/* ---- NEXT EPISODE BADGE ---- */
.next-episode-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(46,204,113,0.15);
  border: 1px solid rgba(46,204,113,0.35);
  border-radius: 20px;
  padding: 2px 7px;
  font-size: 9px;
  font-weight: 700;
  color: #2ecc71;
  margin-top: 4px;
  width: fit-content;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}
.next-episode-badge i { font-size: 8px; }

/* ---- EMPTY MSG ---- */
.empty-msg {
  padding: 32px;
  background: rgba(255,255,255,0.02);
  border-radius: var(--radius);
  text-align: center;
  color: var(--text-muted);
  border: 2px dashed rgba(255,255,255,0.07);
  grid-column: 1 / -1;
  font-size: 14px;
}
.empty-msg i { display: block; font-size: 26px; margin-bottom: 10px; opacity: 0.3; }

.drop-hint { font-size: 12px; color: var(--text-muted); margin-left: auto; display: flex; align-items: center; gap: 6px; }
.drop-hint::before { content: '↕'; display: inline-block; animation: bounce 2s infinite; }
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

/* ---- CATEGORY DRAG STATES ---- */
.category.cat-drag-over .shows-row {
  outline: 2px dashed rgba(229,9,20,0.5);
  outline-offset: 8px;
  border-radius: var(--radius);
  background: rgba(229,9,20,0.03);
}
.category.cat-dragging { opacity: 0.35; }

/* ---- EPOPEE SERIALI ---- */
.legends-section {
  margin-bottom: 54px;
  padding: 0 0 28px 0;
  background: linear-gradient(135deg, rgba(212,175,55,0.05) 0%, transparent 40%, transparent 60%, rgba(212,175,55,0.05) 100%);
  border: 1px solid rgba(212,175,55,0.15);
  border-radius: 18px;
  position: relative;
  overflow: hidden;
}
.legends-section::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent 0%, rgba(184,134,11,0.35) 15%, var(--gold) 35%, var(--gold-light) 50%, var(--gold) 65%, rgba(184,134,11,0.35) 85%, transparent 100%);
}
.legends-header { text-align: center; padding: 28px 24px 20px; }
.crown-row { display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
.crown-line { flex: 1; height: 1px; max-width: 120px; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4)); }
.crown-line.right { background: linear-gradient(270deg, transparent, rgba(212,175,55,0.4)); }
.crown-center { padding: 0 18px; }
.crown-icon { font-size: 40px; color: var(--gold); filter: drop-shadow(0 0 10px rgba(255,215,0,0.5)); }
.legends-title {
  font-family: var(--font-display);
  font-size: 32px;
  letter-spacing: 5px;
  background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 40%, var(--gold-light) 55%, var(--gold) 75%, var(--gold-dark) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin: 0 0 6px 0;
  line-height: 1;
}
.legends-subtitle { font-size: 11px; color: rgba(212,175,55,0.55); letter-spacing: 2.5px; text-transform: uppercase; margin: 0; font-weight: 600; }
.legends-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; padding: 0 22px; }

/* legend card */
.legend-card {
  background: linear-gradient(160deg, #1a1600 0%, #130f00 60%, #1a1600 100%);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 6px 24px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,175,55,0.12);
  transition: var(--transition);
  position: relative;
  cursor: pointer;
}
.legend-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light), var(--gold), var(--gold-dark));
  z-index: 2;
}
.legend-card:hover {
  transform: translateY(-7px);
  box-shadow: 0 14px 36px rgba(0,0,0,0.7), 0 0 0 1px rgba(212,175,55,0.32), 0 0 20px rgba(255,215,0,0.08);
}
.legend-poster-wrap { position: relative; overflow: hidden; }
.legend-poster { width: 100%; height: 225px; object-fit: cover; display: block; transition: transform 0.4s ease; background: #1a1600; }
.legend-card:hover .legend-poster { transform: scale(1.05); }
.legend-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(to top, rgba(10,8,0,0.95) 0%, rgba(20,15,0,0.5) 55%, transparent 100%);
  pointer-events: none;
}
.legend-seasons-badge {
  position: absolute; top: 9px; right: 9px;
  background: linear-gradient(135deg, rgba(184,134,11,0.92), rgba(255,215,0,0.85));
  color: #000; font-size: 10px; font-weight: 900;
  padding: 3px 8px; border-radius: 20px;
  letter-spacing: 0.5px;
  display: flex; align-items: center; gap: 4px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  z-index: 2;
}
.legend-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 0 10px 10px; z-index: 2; }
.legend-badge-row { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
.legend-crown-mini { font-size: 9px; color: var(--gold); }
.legend-label { font-size: 9px; font-weight: 700; color: rgba(212,175,55,0.65); letter-spacing: 1px; text-transform: uppercase; }
.legend-title { font-size: 13px; font-weight: 700; line-height: 1.3; color: #fff; transition: color 0.2s; }
.legend-card:hover .legend-title { color: var(--gold); }
.legend-progress { font-size: 11px; color: rgba(212,175,55,0.6); font-weight: 600; display: flex; align-items: center; gap: 4px; margin-top: 2px; }
.legend-progress::before { content: '●'; font-size: 6px; color: var(--gold); opacity: 0.6; }

/* ---- MODAL ---- */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(12px);
  display: flex; justify-content: center; align-items: center;
  z-index: 10000; padding: 20px;
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-content {
  background: linear-gradient(135deg, #181818 0%, #0e0e0e 100%);
  border-radius: var(--radius);
  max-width: 900px; width: 100%;
  max-height: 90vh; overflow-y: auto;
  border: 1px solid #252525;
  box-shadow: 0 24px 70px rgba(0,0,0,0.85);
  animation: slideUp 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  scrollbar-width: thin;
  scrollbar-color: #333 transparent;
}
.modal-content::-webkit-scrollbar { width: 5px; }
.modal-content::-webkit-scrollbar-track { background: transparent; }
.modal-content::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
@keyframes slideUp { from { opacity: 0; transform: translateY(36px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
.modal-header { padding: 24px 28px 14px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
.modal-header h2 { margin: 0; font-family: var(--font-display); font-size: 30px; letter-spacing: 1px; background: linear-gradient(90deg, var(--accent), #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.modal-close { background: none; border: none; color: var(--text-muted); font-size: 26px; cursor: pointer; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: var(--transition); line-height: 1; }
.modal-close:hover { color: var(--accent); background: rgba(229,9,20,0.1); }
.modal-body { padding: 28px; display: grid; grid-template-columns: 290px 1fr; gap: 28px; }
.modal-poster { width: 100%; border-radius: var(--radius); box-shadow: var(--shadow); object-fit: cover; height: 440px; }
.modal-details { display: flex; flex-direction: column; gap: 18px; }
.detail-row { display: flex; gap: 12px; flex-wrap: wrap; }
.detail-item { background: rgba(255,255,255,0.04); padding: 10px 14px; border-radius: var(--radius-sm); border-left: 3px solid var(--accent); }
.detail-item h4 { margin: 0 0 4px 0; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
.detail-item p { margin: 0; font-size: 15px; font-weight: 700; }
.detail-item.clickable { cursor: pointer; transition: var(--transition); position: relative; }
.detail-item.clickable:hover { background: rgba(229,9,20,0.14); border-left-color: #ff6b6b; transform: translateY(-2px); }
.detail-item.clickable .detail-hint { font-size: 9px; color: var(--text-muted); text-transform: none; letter-spacing: 0; font-weight: 500; margin-top: 2px; opacity: 0.7; }
.overview { line-height: 1.65; color: var(--text-muted); font-size: 14px; }
.modal-footer { padding: 18px 28px; border-top: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
.external-link { display: inline-flex; align-items: center; gap: 8px; color: var(--accent); text-decoration: none; font-weight: 600; font-size: 14px; padding: 9px 18px; border-radius: var(--radius-sm); background: rgba(229,9,20,0.1); transition: var(--transition); }
.external-link:hover { background: rgba(229,9,20,0.2); transform: translateY(-2px); }

/* ---- EDIT MODAL ---- */
.edit-modal { max-width: 420px; }
.edit-modal .modal-header h2 { font-size: 24px; }
.edit-form { display: flex; flex-direction: column; gap: 14px; padding: 24px 28px; }
.edit-form label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; margin-bottom: -8px; }
.edit-form .form-input { min-width: auto; width: 100%; padding: 10px 14px; }
.edit-actions { display: flex; gap: 10px; padding: 16px 28px; border-top: 1px solid #222; }
.edit-actions .btn { flex: 1; }

/* ---- TOGGLE & STATS ---- */
.toggle-container {
  margin-bottom: 24px;
  display: flex; flex-direction: row; justify-content: space-between; align-items: center; gap: 20px;
  padding: 18px 22px;
  background: linear-gradient(135deg, rgba(229,9,20,0.08) 0%, rgba(148,27,33,0.04) 100%);
  border-radius: var(--radius);
  border: 1px solid rgba(229,9,20,0.18);
  box-shadow: 0 6px 24px rgba(229,9,20,0.08);
}
.toggle-left { display: flex; align-items: center; gap: 14px; flex: 1; }
.toggle-icon { width: 44px; height: 44px; flex-shrink: 0; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, rgba(229,9,20,0.18) 0%, rgba(148,27,33,0.12) 100%); border: 1px solid rgba(229,9,20,0.25); color: var(--accent); font-size: 18px; }
.toggle-text { flex: 1; }
.toggle-title { font-size: 15px; font-weight: 700; color: white; margin-bottom: 4px; }
.toggle-description { font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.45; }
.toggle-right { display: flex; align-items: center; gap: 18px; flex-shrink: 0; }
.toggle-switch { position: relative; display: inline-block; width: 64px; height: 34px; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; cursor: pointer; inset: 0; background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.12); transition: var(--transition); border-radius: 34px; }
.toggle-slider:before { position: absolute; content: ''; height: 26px; width: 26px; left: 4px; top: 4px; background: linear-gradient(135deg, #fff 0%, #e8e8e8 100%); transition: var(--transition); border-radius: 50%; box-shadow: 0 2px 6px rgba(0,0,0,0.25); }
input:checked + .toggle-slider { background: linear-gradient(135deg, var(--accent) 0%, #c40812 100%); border-color: rgba(229,9,20,0.5); }
input:checked + .toggle-slider:before { transform: translateX(30px); }
.toggle-status { font-size: 11px; font-weight: 800; padding: 7px 14px; border-radius: 20px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); min-width: 80px; text-align: center; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.7); transition: var(--transition); }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; margin: 26px 0; }
.stat-card { background: linear-gradient(135deg, rgba(229,9,20,0.07) 0%, rgba(148,27,33,0.03) 100%); border-radius: var(--radius); padding: 22px; text-align: center; border: 1px solid rgba(229,9,20,0.12); transition: var(--transition); position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 165px; }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), #ff6b6b); }
.stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(229,9,20,0.12); border-color: rgba(229,9,20,0.22); }
.stat-card h3 { margin: 0 0 12px 0; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; }
.stat-value { font-family: var(--font-display); font-size: 52px; font-weight: 900; color: var(--accent) !important; margin: 8px 0; line-height: 1; text-shadow: 0 2px 14px rgba(229,9,20,0.35); letter-spacing: 1px; }
.stat-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 10px; max-width: 180px; line-height: 1.4; }
.stats-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin: 24px 0; }
.stats-section { background: rgba(255,255,255,0.02); border-radius: var(--radius); padding: 22px; border: 1px solid rgba(255,255,255,0.04); }
.stats-section h3 { margin: 0 0 18px 0; color: white; font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 9px; padding-bottom: 13px; border-bottom: 2px solid rgba(229,9,20,0.25); font-family: var(--font-body); }
.categories-list, .top-shows-list { display: flex; flex-direction: column; gap: 10px; }
.category-item, .top-show-item { display: flex; justify-content: space-between; align-items: center; padding: 13px; background: rgba(255,255,255,0.02); border-radius: 8px; border: 1px solid rgba(255,255,255,0.03); transition: var(--transition); }
.category-item:hover, .top-show-item:hover { background: rgba(255,255,255,0.04); transform: translateX(4px); border-color: rgba(229,9,20,0.08); }
.category-name { font-size: 14px; font-weight: 600; flex: 1; }
.category-stats { display: flex; gap: 18px; align-items: center; }
.category-stat { text-align: right; min-width: 90px; }
.stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }

<script>
// ==================== CONFIG ====================
const TMDB_API_KEY = '74f5aefb6bb96d044cbf995d9b1897e2';
const TMDB_IMG = 'https://image.tmdb.org/t/p/w342';
const TMDB_IMG_LARGE = 'https://image.tmdb.org/t/p/w780';
const PLACEHOLDER_IMG = 'https://via.placeholder.com/300x450/141414/333333?text=+';

// ==================== STATE ====================
let data = [];
const showDetailsCache = new Map();
let renderScheduled = false;
let pendingSeasonFetch = false;
let ratingsData = {};
let searchQuery = '';
let collapsedCategories = new Set();

// Firebase sync
let firebaseEnabled = false;
let ratingsDocRef = null;
let showsDocRef = null;
let firestoreUnsubscribe = null;
let showsUnsubscribe = null;
let applyingRemoteRatings = false;
let applyingRemoteShows = false;

// ==================== LOADING BAR ====================
let loadingCount = 0;
const loadingBar = document.getElementById('loadingBar');
const startLoading = () => { loadingCount++; loadingBar.classList.add('active'); };
const stopLoading = () => { loadingCount = Math.max(0, loadingCount - 1); if (!loadingCount) loadingBar.classList.remove('active'); };

// ==================== FIREBASE ====================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDPlZcNCY14Lkkg6YTsDkq7prmNg-ODbtA",
  authDomain: "serietvtracker.firebaseapp.com",
  projectId: "serietvtracker",
  storageBucket: "serietvtracker.firebasestorage.app",
  messagingSenderId: "51046520782",
  appId: "1:51046520782:web:ea8870a9d9e2deed293d9f",
  measurementId: "G-MC3MZPE900"
};

const updateSyncStatus = (state) => {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.className = `sync-status ${state}`;
  const labels = {
    synced: ['<i class="fas fa-cloud"></i>', 'Sincronizzato'],
    local: ['<i class="fas fa-hard-drive"></i>', 'Solo locale'],
    connecting: ['<i class="fas fa-circle-notch fa-spin"></i>', 'Connessione...'],
    error: ['<i class="fas fa-triangle-exclamation"></i>', 'Errore sync'],
  };
  const [icon, text] = labels[state] || labels.local;
  el.innerHTML = `${icon}<span>${text}</span>`;
};

const initFirebase = () => {
  if (!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey.includes('INSERISCI_QUI')) {
    firebaseEnabled = false;
    updateSyncStatus('local');
    return;
  }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.firestore();
    ratingsDocRef = db.collection('tvtracker').doc('ratings');
    showsDocRef = db.collection('tvtracker').doc('shows');
    firebaseEnabled = true;
    updateSyncStatus('connecting');
  } catch (e) {
    console.error('Firebase init error:', e);
    firebaseEnabled = false;
    updateSyncStatus('error');
  }
};

// Ascolta voti
const listenToRatings = () => {
  if (!firebaseEnabled || !ratingsDocRef) return;
  firestoreUnsubscribe = ratingsDocRef.onSnapshot((doc) => {
    if (doc.exists) {
      const remote = doc.data().data || {};
      applyingRemoteRatings = true;
      ratingsData = remote;
      saveRatingsLocal();
      applyingRemoteRatings = false;
      updateSyncStatus('synced');
      render();
    } else {
      ratingsDocRef.set({ data: ratingsData, updatedAt: firebase.firestore.FieldValue.serverTimestamp() })
        .then(() => updateSyncStatus('synced'))
        .catch(() => updateSyncStatus('error'));
    }
  }, (err) => {
    console.error('Firebase listen ratings error:', err);
    updateSyncStatus('error');
  });
};

// Ascolta dati serie
const listenToShows = () => {
  if (!firebaseEnabled || !showsDocRef) return;
  showsUnsubscribe = showsDocRef.onSnapshot((doc) => {
    if (doc.exists && !applyingRemoteShows) {
      const remoteData = doc.data().data;
      if (remoteData && JSON.stringify(remoteData) !== JSON.stringify(data)) {
        data = remoteData;
        localStorage.setItem('tvtracker-data', JSON.stringify(data));
        showDetailsCache.clear();
        render();
      }
    } else if (!doc.exists) {
      showsDocRef.set({ data: data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }).catch(() => {});
    }
  }, (err) => {
    console.error('Firebase listen shows error:', err);
  });
};

const saveShowsToFirebase = async () => {
  if (!firebaseEnabled || !showsDocRef || applyingRemoteShows) return;
  try {
    applyingRemoteShows = true;
    await showsDocRef.set({ data: data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
  } catch (e) {
    console.error('Errore salvataggio shows su Firebase:', e);
  } finally {
    applyingRemoteShows = false;
  }
};

const loadRatings = () => {
  try { const s = localStorage.getItem('tvtracker-ratings'); if (s) ratingsData = JSON.parse(s); } catch(e) { ratingsData = {}; }
};
const saveRatingsLocal = () => localStorage.setItem('tvtracker-ratings', JSON.stringify(ratingsData));

const saveRatings = async () => {
  saveRatingsLocal();
  if (applyingRemoteRatings || !firebaseEnabled || !ratingsDocRef) return;
  try {
    await ratingsDocRef.set({ data: ratingsData, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    updateSyncStatus('synced');
  } catch (e) {
    console.error('Errore salvataggio ratings su Firebase:', e);
    updateSyncStatus('error');
  }
};

const calcAverage = (s) => (s.cast + s.trama + s.ambientazione + s.colonna_sonora + s.coinvolgimento) / 5;
const toStars = (val) => { const full = Math.round(val / 2); return '★'.repeat(full) + '☆'.repeat(5 - full); };

// ==================== DRAG STATE ====================
const drag = { type: null, catIdx: null, showIdx: null, placeholder: null, lastDroppedTitle: null };

// ==================== UTIL ====================
const escapeHtml = (str) => String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const showError = (msg) => {
  document.getElementById('errorContainer').innerHTML =
    `<div class="error-message"><h3><i class="fas fa-exclamation-triangle"></i> Errore</h3><p>${msg}</p></div>`;
  setTimeout(() => { document.getElementById('errorContainer').innerHTML = ''; }, 5000);
};

// ==================== PERSIST ====================
const saveData = () => {
  localStorage.setItem('tvtracker-data', JSON.stringify(data));
  saveShowsToFirebase();
};

const loadDefaultData = async () => {
  try {
    const res = await fetch(`./data/default-data.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const d = JSON.parse(text.replace(/^\uFEFF/, ''));
    if (!Array.isArray(d)) throw new Error('Formato non valido');
    return d;
  } catch(err) {
    console.error('Errore caricamento default:', err);
    showError(`Impossibile caricare i dati predefiniti: ${err.message}`);
    return [];
  }
};

const initData = async () => {
  const saved = localStorage.getItem('tvtracker-data');
  if (saved) {
    try { data = JSON.parse(saved); if (Array.isArray(data) && data.length) return; } catch(e) {}
  }
  data = await loadDefaultData();
  if (data.length) saveData();
};

const exportToFile = () => {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tvtracker-backup-${new Date().toISOString().slice(0,19)}.json`;
  a.click();
  URL.revokeObjectURL(url);
};

const importFromFile = (file) => {
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error('Il file deve contenere un array di categorie');
      for (const cat of imported) {
        if (!cat.name || !Array.isArray(cat.shows)) throw new Error(`Categoria "${cat.name}" non valida`);
      }
      data = imported;
      saveData();
      showDetailsCache.clear();
      await render();
      showError('✅ Dati importati con successo!');
    } catch(err) { showError(`Importazione fallita: ${err.message}`); }
  };
  reader.readAsText(file);
};

// ==================== TMDB API ====================
class RateLimitedQueue {
  constructor(limit = 3) { this.limit = limit; this.running = 0; this.queue = []; }
  async add(fn) {
    if (this.running >= this.limit) await new Promise(r => this.queue.push(r));
    this.running++;
    try { return await fn(); }
    finally { this.running--; if (this.queue.length) this.queue.shift()(); }
  }
}
const apiQueue = new RateLimitedQueue(3);

const fetchShowDetails = async (title) => {
  if (!title) return null;
  if (showDetailsCache.has(title)) return showDetailsCache.get(title);
  return apiQueue.add(async () => {
    try {
      const sr = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(title)}&language=it-IT`);
      if (!sr.ok) return null;
      const sj = await sr.json();
      if (!sj.results?.length) return null;
      const result = sj.results[0];
      const dr = await fetch(`https://api.themoviedb.org/3/tv/${result.id}?api_key=${TMDB_API_KEY}&language=it-IT&append_to_response=credits`);
      if (!dr.ok) return null;
      const details = await dr.json();
      const filteredSeasons = (details.seasons||[]).filter(s=>s.season_number>0).sort((a,b)=>a.season_number-b.season_number);
      const showDetails = {
        id: details.id, title: details.name, original_title: details.original_name,
        overview: details.overview||'Nessuna descrizione disponibile.',
        poster_path: details.poster_path,
        vote_average: details.vote_average?.toFixed(1)||'N/A',
        first_air_date: details.first_air_date||'Sconosciuta',
        number_of_seasons: filteredSeasons.length,
        number_of_episodes: details.number_of_episodes||0,
        genres: details.genres?.map(g=>g.name).join(', ')||'Nessun genere',
        genre_ids: details.genres?.map(g=>g.id) || [],
        genre_names: details.genres?.map(g=>g.name) || [],
        seasons: filteredSeasons, status: details.status||'Sconosciuto',
        networks: details.networks?.map(n=>n.name).join(', ')||'N/A',
        episode_run_time: details.episode_run_time || [42], // durata episodio in minuti
        next_episode_to_air: details.next_episode_to_air ? {
          air_date: details.next_episode_to_air.air_date,
          episode_number: details.next_episode_to_air.episode_number,
          season_number: details.next_episode_to_air.season_number,
          name: details.next_episode_to_air.name
        } : null
      };
      showDetailsCache.set(title, showDetails);
      return showDetails;
    } catch(e) { console.warn(`Errore fetch ${title}:`, e); return null; }
  });
};

const fetchPoster = async (title) => {
  if (!title) return null;
  const d = await fetchShowDetails(title);
  if (d?.poster_path) return TMDB_IMG + d.poster_path;
  return null;
};

const prefetchDetails = async () => {
  const toFetch = [];
  for (const cat of data)
    for (const show of cat.shows) {
      if (!show.poster) toFetch.push(fetchPoster(show.title).then(url => { if (url) show.poster = url; }));
      toFetch.push(fetchShowDetails(show.title)); // popola cache con tutti i dettagli inclusi next_episode
    }
  if (toFetch.length) { startLoading(); await Promise.all(toFetch); stopLoading(); saveData(); }
};

let seasonUpdatePromise = null;
const updateSeasonsCounts = async () => {
  if (seasonUpdatePromise) return seasonUpdatePromise;
  seasonUpdatePromise = (async () => {
    let updated = false;
    for (const cat of data)
      for (const show of cat.shows)
        if (show.seasons_count === undefined) {
          const d = await fetchShowDetails(show.title);
          if (d?.number_of_seasons !== undefined) { show.seasons_count = d.number_of_seasons; updated = true; }
        }
    if (updated) { saveData(); await render(); }
    seasonUpdatePromise = null;
  })();
  return seasonUpdatePromise;
};

  const info = document.getElementById('searchResultsInfo');
  if (!searchQuery) {
    document.querySelectorAll('.show-card').forEach(c => c.classList.remove('search-hidden'));
    document.querySelectorAll('.category').forEach(cat => cat.style.display = '');

    return;
  }
  let totalVisible = 0;
  document.querySelectorAll('.category').forEach(catEl => {
    const cards = catEl.querySelectorAll('.show-card');
    let catVisible = 0;
    cards.forEach(card => {

      const title = titleEl ? titleEl.textContent.toLowerCase() : '';

      card.classList.toggle('search-hidden', !matches);

    });

// ==================== AUTOCOMPLETE TMDB ====================
const debounceTimers = {};
document.addEventListener('input', (e) => {
  if (e.target.classList.contains('show-title-input')) {
    clearTimeout(debounceTimers[e.target]);
    const query = e.target.value.trim();
    const form = e.target.closest('.add-show-form');
    let dropdown = form.querySelector('.autocomplete-dropdown');
    if (!dropdown) {
      dropdown = document.createElement('div');
      dropdown.className = 'autocomplete-dropdown';
      e.target.parentNode.style.position = 'relative';
      e.target.parentNode.appendChild(dropdown);
    }
    if (query.length < 2) {
      dropdown.innerHTML = '';
      dropdown.style.display = 'none';
      return;
    }
    debounceTimers[e.target] = setTimeout(async () => {
      try {
        const res = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&language=it-IT`);
        const sj = await res.json();
        const results = (sj.results || []).slice(0, 6);
        dropdown.innerHTML = results.map(r => `
          <div class="autocomplete-item" data-title="${escapeHtml(r.name)}" data-poster="${r.poster_path ? TMDB_IMG + r.poster_path : PLACEHOLDER_IMG}" data-year="${r.first_air_date ? r.first_air_date.split('-')[0] : ''}">
            <img src="${r.poster_path ? TMDB_IMG + r.poster_path : PLACEHOLDER_IMG}" alt="">
            <div><strong>${escapeHtml(r.name)}</strong><br><small>${r.first_air_date ? r.first_air_date.split('-')[0] : ''}</small></div>
          </div>
        `).join('');
        dropdown.style.display = results.length ? 'block' : 'none';
      } catch(e) { dropdown.style.display = 'none'; }
    }, 400);
  }
});

document.addEventListener('click', (e) => {
  if (e.target.closest('.autocomplete-item')) {
    const item = e.target.closest('.autocomplete-item');
    const form = item.closest('.add-show-form');
    const titleInput = form.querySelector('.show-title-input');
    const posterInput = form.querySelector('input[placeholder*="poster"]');
    titleInput.value = item.dataset.title;
    if (posterInput && item.dataset.poster) posterInput.value = item.dataset.poster;
    const dropdown = form.querySelector('.autocomplete-dropdown');
    if (dropdown) { dropdown.innerHTML = ''; dropdown.style.display = 'none'; }
  } else {
    document.querySelectorAll('.autocomplete-dropdown').forEach(d => {
      if (!d.contains(e.target)) d.style.display = 'none';
    });
  }
});

function removePlaceholder() {
  if (drag.placeholder && drag.placeholder.parentNode) drag.placeholder.parentNode.removeChild(drag.placeholder);
  drag.placeholder = null;
}
function movePlaceholderTo(grid, beforeEl) {
  if (!drag.placeholder) {
    drag.placeholder = document.createElement('div');
    drag.placeholder.className = 'drop-placeholder';
  }
  if (drag.placeholder.nextSibling === beforeEl && drag.placeholder.parentNode === grid) return;
  if (beforeEl) grid.insertBefore(drag.placeholder, beforeEl);
  else grid.appendChild(drag.placeholder);
}
function getInsertBeforeCard(grid, clientX, clientY) {
  const cards = [...grid.querySelectorAll('.show-card:not(.dragging)')];
  for (const card of cards) {
    const rect = card.getBoundingClientRect();
    const midY = rect.top + rect.height / 2;
    const midX = rect.left + rect.width / 2;
    if (clientY < midY - 5) return card;
    if (Math.abs(clientY - midY) <= rect.height / 2 + 4 && clientX < midX) return card;
  }
  return null;
}

const setupSideNav = () => {
  const edge = document.getElementById('sideNavEdge');
  const panel = document.getElementById('sideNavPanel');
  const toggleMobile = document.getElementById('sideNavToggleMobile');
  const closeBtn = document.getElementById('sideNavClose');
  const backdrop = document.getElementById('sideNavBackdrop');
  const isDesktop = () => window.matchMedia('(min-width: 901px)').matches;

  edge?.addEventListener('mouseenter', () => { if (isDesktop()) openSideNav(); });
  panel?.addEventListener('mouseleave', () => { if (isDesktop()) closeSideNav(); });

  toggleMobile?.addEventListener('click', () => {
    if (panel.classList.contains('open')) closeSideNav();

  await new Promise(r => requestAnimationFrame(r));

  const container = document.getElementById('categoriesContainer');
  const legendsContainer = document.getElementById('legendsContainer');
  if (!container) { renderScheduled = false; return; }

  if (!container.children.length) {
    container.innerHTML = data.slice(0,3).map(() => `
      <div>
        <div style="height:38px;width:220px;background:linear-gradient(90deg,#1a1a1a 25%,#252525 50%,#1a1a1a 75%);background-size:200% 100%;animation:skeletonShimmer 1.5s infinite;border-radius:8px;margin-bottom:16px;"></div>

              ${ratingBadgeHtml}
              ${nextEpisodeBadgeHtml}
            </div>
          </div>`;

        card.querySelector('.poster').onclick = (e) => { e.stopPropagation(); openShowDetails(show.title); };
        card.querySelector('.show-title').onclick = (e) => { e.stopPropagation(); openShowDetails(show.title); };

        const menuBtn = card.querySelector('.card-menu');
        const menuBox = card.querySelector('.card-menu-box');
        menuBtn.onclick = (e) => {
          e.stopPropagation();
          const isOpen = menuBox.style.display !== 'none';
          document.querySelectorAll('.card-menu-box').forEach(b => b.style.display = 'none');
          menuBox.style.display = isOpen ? 'none' : 'block';
        };

        menuBox.querySelector('.delete-btn').onclick  = () => deleteShow(catIdx, showIdx);
        menuBox.querySelector('.edit-btn').onclick    = () => openEditModal(catIdx, showIdx);
        menuBox.querySelector('.details-btn').onclick = () => { openShowDetails(show.title); menuBox.style.display = 'none'; };
        menuBox.querySelector('.rate-btn').onclick    = () => { openRatingModal(show.title, show.poster); menuBox.style.display = 'none'; };

        menuBox.querySelectorAll('[data-move-to]').forEach(btn => {
          btn.onclick = async () => {
            const dstCatIdx = parseInt(btn.dataset.moveTo);
            menuBox.style.display = 'none';
            await moveShow(catIdx, showIdx, dstCatIdx);
          };
        });

        if (ratingEntry) {
          card.querySelector('.rating-badge').onclick = (e) => { e.stopPropagation(); openRatingDetails(show.title); };
        }

        card.addEventListener('dragstart', (e) => {
          drag.type = 'show'; drag.catIdx = catIdx; drag.showIdx = showIdx;
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', 'show');
          setTimeout(() => card.classList.add('dragging'), 0);
        });
        card.addEventListener('dragend', () => {
          card.classList.remove('dragging');
          removePlaceholder();
          document.querySelectorAll('.cat-drag-over').forEach(el => el.classList.remove('cat-drag-over'));
          drag.type = null; drag.catIdx = null; drag.showIdx = null;
        });

        showsRow.appendChild(card);
      }
    }

    showsRow.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (drag.type === 'show') {
        document.querySelectorAll('.cat-drag-over').forEach(el => el.classList.remove('cat-drag-over'));
        catDiv.classList.add('cat-drag-over');
        movePlaceholderTo(showsRow, getInsertBeforeCard(showsRow, e.clientX, e.clientY));
      } else if (drag.type === 'category') {
        document.querySelectorAll('.cat-drag-over').forEach(el => el.classList.remove('cat-drag-over'));
        catDiv.classList.add('cat-drag-over');
      }
    });

    showsRow.addEventListener('dragleave', (e) => {
      if (!catDiv.contains(e.relatedTarget)) catDiv.classList.remove('cat-drag-over');
    });

    showsRow.addEventListener('drop', async (e) => {
      e.preventDefault();
      catDiv.classList.remove('cat-drag-over');
      if (drag.type === 'show' && drag.catIdx !== null && drag.showIdx !== null) {
        const srcCatIdx = drag.catIdx, srcShowIdx = drag.showIdx;
        const dstCatIdx = parseInt(showsRow.dataset.catIdx);
        let insertIdx = data[dstCatIdx].shows.length;
        if (drag.placeholder && drag.placeholder.parentNode === showsRow) {
          const allChildren = [...showsRow.children];
          const phIdx = allChildren.indexOf(drag.placeholder);
          insertIdx = allChildren.slice(0, phIdx).filter(c => c.classList.contains('show-card') && !c.classList.contains('dragging')).length;
        }
        removePlaceholder();
        const movedTitle = data[srcCatIdx].shows[srcShowIdx].title;
        const [movedShow] = data[srcCatIdx].shows.splice(srcShowIdx, 1);
        let realInsertIdx = insertIdx;
        if (srcCatIdx === dstCatIdx && srcShowIdx < insertIdx) realInsertIdx = Math.max(0, insertIdx - 1);
        data[dstCatIdx].shows.splice(realInsertIdx, 0, movedShow);
        drag.lastDroppedTitle = movedTitle;
        saveData();
        drag.type = null; drag.catIdx = null; drag.showIdx = null;
        await render();
        if (drag.lastDroppedTitle) {
          document.querySelectorAll('.show-card').forEach(c => {
            if (c.querySelector('.show-title')?.textContent === drag.lastDroppedTitle) {
              c.classList.add('just-dropped');
              setTimeout(() => c.classList.remove('just-dropped'), 500);
            }
          });
          drag.lastDroppedTitle = null;
        }
      } else if (drag.type === 'category') {
        const srcCatIdx = drag.catIdx, dstCatIdx = catIdx;
        if (srcCatIdx !== dstCatIdx) {
          const [movedCat] = data.splice(srcCatIdx, 1);
          data.splice(dstCatIdx, 0, movedCat);
          const newCollapsed = new Set();
          collapsedCategories.forEach(idx => {
            if (idx === srcCatIdx) newCollapsed.add(dstCatIdx);
            else if (idx >= Math.min(srcCatIdx, dstCatIdx) && idx <= Math.max(srcCatIdx, dstCatIdx)) {
              newCollapsed.add(srcCatIdx < dstCatIdx ? idx - 1 : idx + 1);
            } else newCollapsed.add(idx);
          });
          collapsedCategories = newCollapsed;
          saveData();
        }
        drag.type = null; drag.catIdx = null;
        await render();
      }
    });

    bodyDiv.appendChild(showsRow);

    const addForm = document.createElement('form');
    addForm.className = 'add-show-form';
    addForm.innerHTML = `
      <div style="position:relative">
        <input type="text" class="show-title-input" placeholder="Titolo serie..." autocomplete="off" />
      </div>
      <input type="text" placeholder="Volte viste (0 = da vedere)" />
      <input type="text" placeholder="URL poster (opzionale)" />
      <button type="submit" class="btn btn-secondary"><i class="fas fa-plus btn-icon"></i> Aggiungi</button>
      <span class="drop-hint">Trascina per riordinare</span>`;
    addForm.onsubmit = async (e) => {
      e.preventDefault();
      const inputs = addForm.querySelectorAll('input');
      const title = inputs[0].value.trim();
      if (!title) return;
      let progress = inputs[1].value.trim().replace(',', '.');
      const poster = inputs[2].value.trim() || undefined;
      const matched = progress.match(/[\d.]+/);
      progress = matched ? matched[0] : (progress ? progress : undefined);
      data[catIdx].shows.push({ title, progress: progress || undefined, poster, addedAt: new Date().toISOString() });
      saveData();
      inputs[0].value = ''; inputs[1].value = ''; inputs[2].value = '';
      const dropdown = addForm.querySelector('.autocomplete-dropdown');
      if (dropdown) { dropdown.innerHTML = ''; dropdown.style.display = 'none'; }
      await render();
    };
    bodyDiv.appendChild(addForm);
    catDiv.appendChild(bodyDiv);
    container.appendChild(catDiv);
  }

  renderCategoryNav(legendShows);

  renderScheduled = false;
  applySearch();

  if (!pendingSeasonFetch) {
    pendingSeasonFetch = true;
    setTimeout(async () => { await updateSeasonsCounts(); pendingSeasonFetch = false; }, 500);
  }
};

};

const moveShow = async (srcCatIdx, srcShowIdx, dstCatIdx) => {

  data[dstCatIdx].shows.push(movedShow);
  saveData();
  await render();
};

const deleteCategory = async (catIdx) => {
  const cat = data[catIdx];
  const hasShows = cat.shows.length > 0;
  const msg = hasShows
    ? `Eliminare la categoria "${cat.name}" con ${cat.shows.length} serie? Le serie verranno perse.`
    : `Eliminare la categoria vuota "${cat.name}"?`;
  if (!confirm(msg)) return;
  data.splice(catIdx, 1);
  const newCollapsed = new Set();
  collapsedCategories.forEach(idx => { if (idx < catIdx) newCollapsed.add(idx); else if (idx > catIdx) newCollapsed.add(idx - 1); });
  collapsedCategories = newCollapsed;
  saveData();
  await render();
};

// ==================== STATISTICS (estese) ====================
const showStatistics = () => {
  let excludeFuture = false, excludeWatching = false;
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  const modalContent = document.createElement('div');
  modalContent.className = 'modal-content';
  modalContent.style.maxWidth = '1050px';

  const refreshStats = () => {
    let totalShows = 0, totalViews = 0;
    const categories = [], mostWatched = [];
    const addedPerMonth = {}; // mese-anno -> conteggio
    const genreCount = {};     // genere -> conteggio
    let totalWatchTimeMin = 0;

    for (const cat of data) {
      const isFuture   = cat.name.toLowerCase().includes('da vedere in futuro');
      const isWatching = cat.name.toLowerCase().includes('sto guardando');
      if (excludeFuture && isFuture) continue;
      if (excludeWatching && isWatching) continue;

      let catShows = 0, catViews = 0;
      for (const show of cat.shows) {
        catShows++; totalShows++;
        let views = 1;
        if (show.progress && show.progress !== '0') {
          const val = parseFloat(String(show.progress).replace(',', '.'));
          if (!isNaN(val)) views = val;
        }
        catViews += views; totalViews += views;
        mostWatched.push({ title: show.title, views, category: cat.name });

        // Data aggiunta per grafico temporale
        if (show.addedAt) {
          const d = new Date(show.addedAt);
          const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
          addedPerMonth[key] = (addedPerMonth[key] || 0) + 1;
        }

        // Dettagli per tempo e generi (solo se vista almeno una volta)
        if (views > 0) {
          const details = showDetailsCache.get(show.title);
          if (details) {
            const epDuration = details.episode_run_time?.[0] || 42; // min
            totalWatchTimeMin += details.number_of_episodes * epDuration * views;
            (details.genre_names || []).forEach(g => {
              genreCount[g] = (genreCount[g] || 0) + views;
            });
          }
        }
      }
      categories.push({ name: cat.name, showCount: catShows, totalViews: catViews });
    }
    mostWatched.sort((a,b) => b.views - a.views);

    // Ratings stats (come prima)
    const ratedEntries = Object.entries(ratingsData);
    const ratedCount = ratedEntries.length;
    let ratingSum = 0, bestShow = null, bestAvg = 0;
    const catSums = { cast: 0, trama: 0, ambientazione: 0, colonna_sonora: 0, coinvolgimento: 0 };
    const topRated = [];
    for (const [title, entry] of ratedEntries) {
      ratingSum += entry.average;
      if (entry.average > bestAvg) { bestAvg = entry.average; bestShow = title; }
      for (const k of Object.keys(catSums)) catSums[k] += entry[k] || 0;
      let catName = '';
      for (const cat of data) { if (cat.shows.find(s => s.title === title)) { catName = cat.name; break; } }
      topRated.push({ title, avg: entry.average, cat: catName });
    }
    topRated.sort((a,b) => b.avg - a.avg);
    const globalAvgRating = ratedCount ? (ratingSum / ratedCount).toFixed(1) : '—';

    const RATING_CAT_INFO = [
      { key: 'cast', label: 'Cast', icon: 'fa-users' },
      { key: 'trama', label: 'Trama', icon: 'fa-book-open' },
      { key: 'ambientazione', label: 'Ambientazione', icon: 'fa-map-location-dot' },
      { key: 'colonna_sonora', label: 'Colonna Sonora', icon: 'fa-music' },
      { key: 'coinvolgimento', label: 'Coinvolgimento', icon: 'fa-fire' },
    ];

    const catAvgBarsHtml = RATING_CAT_INFO.map(c => {
      const avg = ratedCount ? (catSums[c.key] / ratedCount).toFixed(1) : 0;
      return `
        <div class="cat-avg-bar-row">
          <div class="cat-avg-bar-label"><i class="fas ${c.icon}"></i>${c.label}</div>
          <div class="cat-avg-bar-track"><div class="cat-avg-bar-fill" style="width:${(avg/10)*100}%"></div></div>
          <div class="cat-avg-bar-val">${avg}</div>
        </div>`;
    }).join('');

    const topRatedHtml = topRated.slice(0,5).map((s,i) => `
      <div class="top-rated-item">
        <div class="top-rated-rank">${i+1}</div>
        <div class="top-rated-info">
          <div class="top-rated-title">${escapeHtml(s.title)}</div>
          <div class="top-rated-cat">${escapeHtml(s.cat)}</div>
        </div>
        <div class="top-rated-score">
          <div class="top-rated-avg">${s.avg.toFixed(1)}</div>
          <div class="top-rated-stars">${toStars(s.avg)}</div>
        </div>
      </div>`).join('');

    const ratingsSection = ratedCount ? `
      <div class="stats-ratings-section">
        <div class="stats-section">
          <h3><i class="fas fa-star" style="color:var(--gold)"></i> Valutazioni</h3>
          <div class="ratings-stats-grid">
            <div class="rating-stat-card">
              <div class="rating-stat-card-label">Serie valutate</div>
              <div class="rating-stat-card-value">${ratedCount}</div>
              <div class="rating-stat-card-sub">su ${totalShows} totali</div>
            </div>
            <div class="rating-stat-card">
              <div class="rating-stat-card-label">Media globale</div>
              <div class="rating-stat-card-value">${globalAvgRating}</div>
              <div class="rating-stat-card-sub">${toStars(parseFloat(globalAvgRating))}</div>
            </div>
            ${bestShow ? `<div class="rating-stat-card">
              <div class="rating-stat-card-label">Migliore</div>
              <div class="rating-stat-card-value" style="font-size:20px;padding-top:4px;">${escapeHtml(bestShow)}</div>
              <div class="rating-stat-card-sub">${bestAvg.toFixed(1)} / 10</div>
            </div>` : ''}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px;">
            <div>
              <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;">Media per categoria</div>
              <div class="category-avg-bars">${catAvgBarsHtml}</div>
            </div>
            <div>
              <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;">Top 5 serie votate</div>
              <div class="top-rated-list">${topRatedHtml}</div>
            </div>
          </div>
        </div>
      </div>` : `<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:14px;">
        <i class="fas fa-star" style="font-size:24px;opacity:0.3;display:block;margin-bottom:8px;"></i>
        Nessuna serie valutata ancora. Usa il bottone <strong style="color:var(--accent)">★</strong> sulle card per iniziare.
      </div>`;

    // Tempo totale
    const totalHours = (totalWatchTimeMin / 60).toFixed(1);
    const totalDays = (totalWatchTimeMin / 1440).toFixed(1);

    // Generi più visti (top 5)
    const genreEntries = Object.entries(genreCount).sort((a,b) => b[1] - a[1]);
    const genreBarsHtml = genreEntries.slice(0,5).map(([name, count]) => `
      <div class="bar-chart-row">
        <div class="bar-chart-label">${escapeHtml(name)}</div>
        <div class="bar-chart-track">
          <div class="bar-chart-fill" style="width:${Math.min(100, (count / (genreEntries[0]?.[1] || 1))*100)}%"></div>
        </div>
        <div class="bar-chart-value">${count}</div>
      </div>`).join('');

    // Serie aggiunte per mese (ultimi 12 mesi)
    const now = new Date();
    const months = [];
    for (let i = 11; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      const monthName = d.toLocaleString('it-IT', { month:'short', year:'numeric' });
      months.push({ key, label: monthName, count: addedPerMonth[key] || 0 });
    }
    const maxAdded = Math.max(1, ...months.map(m => m.count));
    const addedBarsHtml = months.map(m => `
      <div class="bar-chart-row">
        <div class="bar-chart-label">${m.label}</div>
        <div class="bar-chart-track">
          <div class="bar-chart-fill" style="width:${(m.count / maxAdded)*100}%"></div>
        </div>
        <div class="bar-chart-value">${m.count}</div>
      </div>`).join('');

    const extraSection = `
      <div class="stats-extra-section">
        <div class="stats-section">
          <h3><i class="fas fa-clock"></i> Tempo totale di visione stimato</h3>
          <p><span class="stats-time-total">${totalHours} ore</span> (circa ${totalDays} giorni)</p>
          <p style="color:var(--text-muted);font-size:13px;">Basato su episodi × durata media (TMDB)</p>
        </div>
        <div class="stats-section" style="margin-top:16px;">
          <h3><i class="fas fa-tags"></i> Generi più visti</h3>
          <div class="bar-chart">${genreBarsHtml || '<p style="color:var(--text-muted);">Nessun dato</p>'}</div>
        </div>
        <div class="stats-section" style="margin-top:16px;">
          <h3><i class="fas fa-calendar-alt"></i> Serie aggiunte per mese (ultimi 12 mesi)</h3>
          <div class="bar-chart">${addedBarsHtml || '<p style="color:var(--text-muted);">Nessuna data di aggiunta disponibile</p>'}</div>
        </div>
      </div>`;

    const togglesHtml = `
      <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:24px;">
        <div class="toggle-container" style="margin-bottom:0;">
          <div class="toggle-left">
            <div class="toggle-icon"><i class="fas fa-clock"></i></div>
            <div class="toggle-text">
              <div class="toggle-title">Serie "Da vedere in futuro"</div>
              <div class="toggle-description">Includi nelle statistiche le serie in lista d'attesa</div>
            </div>
          </div>
          <div class="toggle-right">
            <label class="toggle-switch"><input type="checkbox" id="futureToggle" ${excludeFuture ? '' : 'checked'}><span class="toggle-slider"></span></label>
            <div class="toggle-status">${excludeFuture ? 'ESCLUSE' : 'INCLUSE'}</div>
          </div>
        </div>
        <div class="toggle-container" style="margin-bottom:0;">
          <div class="toggle-left">
            <div class="toggle-icon"><i class="fas fa-play"></i></div>
            <div class="toggle-text">
              <div class="toggle-title">Serie "Sto guardando"</div>
              <div class="toggle-description">Includi nelle statistiche le serie che stai guardando</div>
            </div>
          </div>
          <div class="toggle-right">
            <label class="toggle-switch"><input type="checkbox" id="watchingToggle" ${excludeWatching ? '' : 'checked'}><span class="toggle-slider"></span></label>
            <div class="toggle-status">${excludeWatching ? 'ESCLUSE' : 'INCLUSE'}</div>
          </div>
        </div>
      </div>`;

    modalContent.innerHTML = `
      <div class="modal-header">
        <h2><i class="fas fa-chart-bar"></i> Statistiche Serie TV</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body" style="display:block;padding:28px;">
        ${togglesHtml}
        <div class="stats-grid">
          <div class="stat-card"><h3>Serie Totali</h3><p class="stat-value">${totalShows}</p></div>
          <div class="stat-card"><h3>Visioni Totali</h3><p class="stat-value">${totalViews.toFixed(1)}</p></div>
          <div class="stat-card"><h3>Media Visioni</h3><p class="stat-value">${totalShows ? (totalViews/totalShows).toFixed(1) : 0}</p></div>
          <div class="stat-card"><h3>Categorie</h3><p class="stat-value">${categories.length}</p></div>
        </div>
        <div class="stats-columns">
          <div class="stats-section">
            <h3><i class="fas fa-folder"></i> Per Categoria</h3>
            <div class="categories-list">
              ${categories.map(c => `
                <div class="category-item">
                  <div class="category-name">${escapeHtml(c.name)}</div>
                  <div class="category-stats">
                    <div class="category-stat"><div class="stat-label">Serie</div><div class="stat-number">${c.showCount}</div></div>
                    <div class="category-stat"><div class="stat-label">Visioni</div><div class="stat-number">${c.totalViews}</div></div>
                  </div>
                </div>`).join('')}
            </div>
          </div>
          <div class="stats-section">
            <h3><i class="fas fa-trophy"></i> Più Viste</h3>
            <div class="top-shows-list">
              ${mostWatched.slice(0,8).map((s,i) => `
                <div class="top-show-item">
                  <div class="show-rank">${i+1}</div>
                  <div>
                    <div class="show-title" style="color:var(--text)">${escapeHtml(s.title)}</div>
                    <div class="show-category">${escapeHtml(s.category)}</div>
                  </div>
                  <div><div class="show-views">${s.views}</div><div class="show-views-label">visioni</div></div>
                </div>`).join('')}
            </div>
          </div>
        </div>
        ${ratingsSection}
        ${extraSection}
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="closeStats">Chiudi</button>
      </div>`;

    modalContent.querySelector('#futureToggle').onchange   = (e) => { excludeFuture   = !e.target.checked; refreshStats(); };
    modalContent.querySelector('#watchingToggle').onchange = (e) => { excludeWatching = !e.target.checked; refreshStats(); };
    modalContent.querySelector('.modal-close').onclick = () => modal.remove();
    modalContent.querySelector('#closeStats').onclick  = () => modal.remove();
  };

  refreshStats();
  modal.appendChild(modalContent);
  document.body.appendChild(modal);
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
};

// ==================== PRINT ====================
const printList = () => {
  let output = '', globalCounter = 1;
  for (const cat of data) {
    output += `${cat.name}\n${'='.repeat(cat.name.length)}\n\n`;
    for (const show of cat.shows) {
      const legend = (show.seasons_count || 0) >= 8 ? ' 👑' : '';
      const prog = show.progress ? ` — ${show.progress} volte` : (show.progress === '0' ? ' — Da vedere' : '');
      const rating = ratingsData[show.title] ? ` ★${ratingsData[show.title].average.toFixed(1)}` : '';
      output += `${legend ? '👑 ' : `${globalCounter++}. `}${show.title}${prog}${rating}\n`;
    }
    output += '\n\n';
  }
  const win = window.open('', '_blank');
  win.document.write(`<pre style="font-family:monospace;white-space:pre-wrap;background:#000;color:#fff;padding:20px;">${output}</pre>`);
  win.document.close();
};

// ==================== RESET ====================
const resetData = async () => {
  if (confirm('Ripristinare i dati originali? Tutte le modifiche andranno perse.')) {
    localStorage.removeItem('tvtracker-data');
    showDetailsCache.clear();
    collapsedCategories.clear();
    data = await loadDefaultData();
    if (data.length) saveData();
    await render();
  }
};

// ==================== EVENTS ====================
document.getElementById('printListBtn').onclick = printList;
document.getElementById('statsBtn').onclick      = showStatistics;
document.getElementById('resetBtn').onclick      = resetData;
document.getElementById('exportBtn').onclick     = exportToFile;
document.getElementById('importBtn').onclick     = () => document.getElementById('importFileInput').click();
document.getElementById('importFileInput').onchange = (e) => { if(e.target.files[0]) importFromFile(e.target.files[0]); e.target.value = ''; };

document.getElementById('addCategoryForm').onsubmit = async (e) => {
  e.preventDefault();
  const name = document.getElementById('newCategoryName').value.trim();
  if (!name) return;
  data.push({ name, shows: [] });
  saveData();
  document.getElementById('newCategoryName').value = '';
  await render();
};

document.getElementById('ratingFab').onclick = openRandomRating;

// ==================== SERVICE WORKER ====================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(reg => console.log('Service Worker registrato', reg))
    .catch(err => console.log('SW registrazione fallita', err));
}

// ==================== BOOT ====================
(async () => {
  loadRatings();
  initFirebase();
  listenToRatings();
  listenToShows();
  await initData();
  setupSearch();
  setupSideNav();
  await render();
})();
</script>
</body>
</html>
