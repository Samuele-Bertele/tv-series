<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TVTRACKER - Gestione Serie TV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e50914">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root {
      --bg: #080808;
      --bg-soft: #111111;
      --bg-card: #141414;
      --accent: #e50914;
      --accent-hover: #ff1a25;
      --accent-glow: rgba(229, 9, 20, 0.3);
      --gold: #FFD700;
      --gold-dark: #B8860B;
      --gold-light: #FFF8DC;
      --gold-glow: rgba(255, 215, 0, 0.35);
      --text: #f0f0f0;
      --text-muted: #888;
      --radius: 14px;
      --radius-sm: 9px;
      --shadow: 0 6px 24px rgba(0,0,0,0.55);
      --shadow-hover: 0 14px 32px rgba(0,0,0,0.7);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Outfit', sans-serif;
    }
    * { box-sizing: border-box; }

    /* scrollbar globale */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    * { scrollbar-width: thin; scrollbar-color: #2a2a2a transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      padding: 30px;
      max-width: 1440px;
      margin: 0 auto;
      font-size: 15px;
      line-height: 1.5;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9998;
      opacity: 0.4;
    }

    /* ---- TOP BAR ---- */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 44px;
      flex-wrap: wrap;
      gap: 24px;
      padding: 22px 28px;
      background: linear-gradient(135deg, #131313 0%, #181818 100%);
      border-radius: var(--radius);
      border: 1px solid #222;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .top-bar::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 30%, #ff6b6b 60%, var(--accent) 80%, transparent 100%);
    }
    .top-bar-left { display: flex; flex-direction: column; gap: 10px; }
    .logo {
      font-family: var(--font-display);
      font-size: 44px;
      color: var(--accent);
      letter-spacing: 2px;
      text-shadow: 0 2px 16px var(--accent-glow);
      line-height: 1;
      transition: var(--transition);
    }
    .logo:hover { text-shadow: 0 4px 28px rgba(229,9,20,0.5); letter-spacing: 3px; }
    .subtitle { font-size: 13px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.5px; }
    .button-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 38px;
      letter-spacing: 0.3px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, #c40812 100%);
      color: white;
      box-shadow: 0 3px 12px rgba(229,9,20,0.25);
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, var(--accent-hover) 0%, #d40913 100%);
      transform: translateY(-2px);
      box-shadow: 0 7px 22px rgba(229,9,20,0.4);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary {
      background: rgba(255,255,255,0.07);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }
    .btn-icon { width: 14px; height: 14px; opacity: 0.9; }
    .add-category-form { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .input-group { position: relative; display: flex; align-items: center; }
    .input-icon { position: absolute; left: 14px; color: var(--text-muted); pointer-events: none; font-size: 13px; }
    .form-input {
      padding: 11px 16px 11px 40px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      min-width: 270px;
      transition: var(--transition);
    }
    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .form-input::placeholder { color: var(--text-muted); }

    /* ---- CATEGORIES ---- */
    .categories { display: flex; flex-direction: column; gap: 48px; }
    .category-title {
      font-family: var(--font-display);
      font-size: 28px;
      letter-spacing: 1.5px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      cursor: grab;
      user-select: none;
    }
    .category-title::before {
      content: '';
      display: block;
      width: 4px;
      height: 26px;
      background: linear-gradient(180deg, var(--accent), #c40812);
      border-radius: 2px;
      flex-shrink: 0;
    }
    .category-title .drag-handle {
      font-size: 16px;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity 0.2s;
      margin-left: auto;
      cursor: grab;
    }
    .category:hover .category-title .drag-handle { opacity: 1; }

    /* ---- SHOWS ROW ---- */
    .shows-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 16px; }

    /* ---- DROP PLACEHOLDER ---- */
    .drop-placeholder {
      border-radius: var(--radius);
      border: 2px dashed var(--accent);
      background: rgba(229,9,20,0.07);
      min-height: 240px;
      transition: background 0.15s ease, border-color 0.15s ease;
      pointer-events: none;
      animation: placeholderPulse 1.2s ease-in-out infinite;
    }
    @keyframes placeholderPulse {
      0%, 100% { background: rgba(229,9,20,0.05); border-color: rgba(229,9,20,0.5); }
      50% { background: rgba(229,9,20,0.12); border-color: rgba(229,9,20,0.9); }
    }

    /* ---- SHOW CARD — nuovo stile overlay ---- */
    .show-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: grab;
      box-shadow: var(--shadow);
      transition: var(--transition);
      position: relative;
      border: 1px solid rgba(255,255,255,0.05);
      user-select: none;
    }
    .show-card:hover { transform: translateY(-7px); box-shadow: var(--shadow-hover); border-color: rgba(229,9,20,0.18); }
    .show-card.dragging { opacity: 0.15; transform: scale(0.95); box-shadow: none; pointer-events: none; }
    .show-card[data-is-legend="true"] { border-color: rgba(255,215,0,0.12); }
    .show-card[data-is-legend="true"]:hover { border-color: rgba(255,215,0,0.28); }

    /* poster wrap */
    .poster-wrap { position: relative; overflow: hidden; }
    .poster {
      width: 100%;
      height: 240px;
      object-fit: cover;
      background: linear-gradient(135deg, #1c1c1c 0%, #242424 100%);
      display: block;
      transition: transform 0.38s ease;
    }
    .show-card:hover .poster { transform: scale(1.05); }

    /* gradient overlay */
    .poster-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 130px;
      background: linear-gradient(to top, rgba(0,0,0,0.93) 0%, rgba(0,0,0,0.55) 50%, transparent 100%);
      pointer-events: none;
    }
    /* gold overlay per leggende */
    .show-card[data-is-legend="true"] .poster-overlay {
      background: linear-gradient(to top, rgba(10,8,0,0.95) 0%, rgba(30,20,0,0.55) 55%, transparent 100%);
    }

    /* numero — badge in alto a sinistra */
    .show-number {
      position: absolute;
      top: 9px;
      left: 9px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 800;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.3px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 4px;
      line-height: 1.4;
    }

    /* menu ⋮ — in alto a destra */
    .card-menu {
      position: absolute;
      top: 7px;
      right: 9px;
      z-index: 3;
      cursor: pointer;
      font-size: 19px;
      color: rgba(255,255,255,0.7);
      line-height: 1;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      border-radius: 6px;
      transition: background 0.2s, color 0.2s;
    }
    .card-menu:hover { background: rgba(0,0,0,0.8); color: #fff; }
    .card-menu-box {
      position: absolute;
      background: #1e1e1e;
      border: 1px solid #333;
      padding: 6px;
      border-radius: 8px;
      margin-top: 4px;
      right: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 130px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }
    .card-menu-box button {
      background: rgba(255,255,255,0.06);
      border: none;
      padding: 7px 11px;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      text-align: left;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .card-menu-box button:hover { background: rgba(255,255,255,0.12); }
    .card-menu-box .delete-btn { color: #ff6b6b; }
    .card-menu-box .delete-btn:hover { background: rgba(229,9,20,0.15); }

    /* testo sovrapposto al poster */
    .poster-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 10px 10px;
      z-index: 2;
    }
    .show-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
      cursor: pointer;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      transition: color 0.2s;
      margin-bottom: 3px;
    }
    .show-title:hover { color: var(--accent); }
    .show-progress {
      font-size: 11px;
      color: #ff6b6b;
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 600;
      text-shadow: 0 1px 3px rgba(0,0,0,0.7);
    }
    .show-progress::before { content: '●'; font-size: 6px; flex-shrink: 0; }
    .show-progress.unseen { color: #666; }
    .show-progress.unseen::before { content: '○'; }

    /* rating badge — nella poster-info, sotto il titolo */
    .rating-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: linear-gradient(135deg, rgba(255,215,0,0.18), rgba(255,215,0,0.08));
      border: 1px solid rgba(255,215,0,0.35);
      border-radius: 20px;
      padding: 2px 7px;
      font-size: 10px;
      font-weight: 800;
      color: var(--gold);
      cursor: pointer;
      transition: var(--transition);
      margin-top: 3px;
      width: fit-content;
    }
    .rating-badge:hover {
      background: linear-gradient(135deg, rgba(255,215,0,0.3), rgba(255,215,0,0.16));
      border-color: rgba(255,215,0,0.6);
      transform: scale(1.06);
    }
    .rating-badge i { font-size: 8px; }

    /* ---- ADD SHOW FORM ---- */
    .add-show-form { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .add-show-form input {
      padding: 9px 13px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13px;
      transition: var(--transition);
    }
    .add-show-form input:focus { outline: none; border-color: var(--accent); background: rgba(255,255,255,0.08); }
    .add-show-form input::placeholder { color: var(--text-muted); }

    /* ---- EMPTY MSG ---- */
    .empty-msg {
      padding: 32px;
      background: rgba(255,255,255,0.02);
      border-radius: var(--radius);
      text-align: center;
      color: var(--text-muted);
      border: 2px dashed rgba(255,255,255,0.07);
      grid-column: 1 / -1;
      font-size: 14px;
    }
    .empty-msg i { display: block; font-size: 26px; margin-bottom: 10px; opacity: 0.3; }

    .drop-hint { font-size: 12px; color: var(--text-muted); margin-left: auto; display: flex; align-items: center; gap: 6px; }
    .drop-hint::before { content: '↕'; display: inline-block; animation: bounce 2s infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

    /* ---- CATEGORY DRAG STATES ---- */
    .category.cat-drag-over .shows-row {
      outline: 2px dashed rgba(229,9,20,0.5);
      outline-offset: 8px;
      border-radius: var(--radius);
      background: rgba(229,9,20,0.03);
    }
    .category.cat-dragging { opacity: 0.35; }

    /* ---- LEGENDS — versione semplificata ---- */
    .legends-section {
      margin-bottom: 54px;
      padding: 0 0 28px 0;
      background: linear-gradient(135deg, rgba(212,175,55,0.05) 0%, transparent 40%, transparent 60%, rgba(212,175,55,0.05) 100%);
      border: 1px solid rgba(212,175,55,0.15);
      border-radius: 18px;
      position: relative;
      overflow: hidden;
    }
    .legends-section::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(184,134,11,0.35) 15%, var(--gold) 35%, var(--gold-light) 50%, var(--gold) 65%, rgba(184,134,11,0.35) 85%, transparent 100%);
    }
    .legends-header { text-align: center; padding: 28px 24px 20px; }
    .crown-row { display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
    .crown-line { flex: 1; height: 1px; max-width: 120px; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4)); }
    .crown-line.right { background: linear-gradient(270deg, transparent, rgba(212,175,55,0.4)); }
    .crown-center { padding: 0 18px; }
    .crown-icon {
      font-size: 40px;
      color: var(--gold);
      filter: drop-shadow(0 0 10px rgba(255,215,0,0.5));
    }
    .legends-title {
      font-family: var(--font-display);
      font-size: 32px;
      letter-spacing: 5px;
      background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 40%, var(--gold-light) 55%, var(--gold) 75%, var(--gold-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 6px 0;
      line-height: 1;
    }
    .legends-subtitle { font-size: 11px; color: rgba(212,175,55,0.55); letter-spacing: 2.5px; text-transform: uppercase; margin: 0; font-weight: 600; }
    .legends-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; padding: 0 22px; }

    /* legend card — usa la stessa struttura overlay delle show-card */
    .legend-card {
      background: linear-gradient(160deg, #1a1600 0%, #130f00 60%, #1a1600 100%);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,175,55,0.12);
      transition: var(--transition);
      position: relative;
      cursor: pointer;
    }
    .legend-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light), var(--gold), var(--gold-dark));
      z-index: 2;
    }
    .legend-card:hover {
      transform: translateY(-7px);
      box-shadow: 0 14px 36px rgba(0,0,0,0.7), 0 0 0 1px rgba(212,175,55,0.32), 0 0 20px rgba(255,215,0,0.08);
    }
    .legend-poster-wrap { position: relative; overflow: hidden; }
    .legend-poster {
      width: 100%; height: 225px;
      object-fit: cover; display: block;
      transition: transform 0.4s ease;
      background: #1a1600;
    }
    .legend-card:hover .legend-poster { transform: scale(1.05); }
    .legend-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(to top, rgba(10,8,0,0.95) 0%, rgba(20,15,0,0.5) 55%, transparent 100%);
      pointer-events: none;
    }
    .legend-seasons-badge {
      position: absolute; top: 9px; right: 9px;
      background: linear-gradient(135deg, rgba(184,134,11,0.92), rgba(255,215,0,0.85));
      color: #000; font-size: 10px; font-weight: 900;
      padding: 3px 8px; border-radius: 20px;
      letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      z-index: 2;
    }
    .legend-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 0 10px 10px; z-index: 2; }
    .legend-badge-row { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
    .legend-crown-mini { font-size: 9px; color: var(--gold); }
    .legend-label { font-size: 9px; font-weight: 700; color: rgba(212,175,55,0.65); letter-spacing: 1px; text-transform: uppercase; }
    .legend-title { font-size: 13px; font-weight: 700; line-height: 1.3; color: #fff; transition: color 0.2s; }
    .legend-card:hover .legend-title { color: var(--gold); }
    .legend-progress { font-size: 11px; color: rgba(212,175,55,0.6); font-weight: 600; display: flex; align-items: center; gap: 4px; margin-top: 2px; }
    .legend-progress::before { content: '●'; font-size: 6px; color: var(--gold); opacity: 0.6; }

    /* ---- MODAL ---- */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(12px);
      display: flex; justify-content: center; align-items: center;
      z-index: 10000; padding: 20px;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-content {
      background: linear-gradient(135deg, #181818 0%, #0e0e0e 100%);
      border-radius: var(--radius);
      max-width: 900px; width: 100%;
      max-height: 90vh; overflow-y: auto;
      border: 1px solid #252525;
      box-shadow: 0 24px 70px rgba(0,0,0,0.85);
      animation: slideUp 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    .modal-content::-webkit-scrollbar { width: 5px; }
    .modal-content::-webkit-scrollbar-track { background: transparent; }
    .modal-content::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(36px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .modal-header { padding: 24px 28px 14px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h2 { margin: 0; font-family: var(--font-display); font-size: 30px; letter-spacing: 1px; background: linear-gradient(90deg, var(--accent), #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .modal-close { background: none; border: none; color: var(--text-muted); font-size: 26px; cursor: pointer; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: var(--transition); line-height: 1; }
    .modal-close:hover { color: var(--accent); background: rgba(229,9,20,0.1); }
    .modal-body { padding: 28px; display: grid; grid-template-columns: 290px 1fr; gap: 28px; }
    .modal-poster { width: 100%; border-radius: var(--radius); box-shadow: var(--shadow); object-fit: cover; height: 440px; }
    .modal-details { display: flex; flex-direction: column; gap: 18px; }
    .detail-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .detail-item { background: rgba(255,255,255,0.04); padding: 10px 14px; border-radius: var(--radius-sm); border-left: 3px solid var(--accent); }

    .overview { line-height: 1.65; color: var(--text-muted); font-size: 14px; }
    .modal-footer { padding: 18px 28px; border-top: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
    .external-link { display: inline-flex; align-items: center; gap: 8px; color: var(--accent); text-decoration: none; font-weight: 600; font-size: 14px; padding: 9px 18px; border-radius: var(--radius-sm); background: rgba(229,9,20,0.1); transition: var(--transition); }
    .external-link:hover { background: rgba(229,9,20,0.2); transform: translateY(-2px); }

    /* ---- EDIT MODAL ---- */
    .edit-modal { max-width: 420px; }

    .edit-form { display: flex; flex-direction: column; gap: 14px; padding: 24px 28px; }

    .edit-actions { display: flex; gap: 10px; padding: 16px 28px; border-top: 1px solid #222; }
