<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TVTRACKER - Gestione Serie TV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e50914">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="loading-bar" id="loadingBar"></div>
<div class="top-bar">
  <div class="top-bar-left">
    <div class="logo">TVTRACKER</div>
    <div class="subtitle">Gestisci le tue serie TV con drag &amp; drop</div>
    <div class="button-group">
      <button class="btn btn-primary" id="printListBtn"><i class="fas fa-print btn-icon"></i> Stampa lista</button>
      <button class="btn btn-secondary" id="statsBtn"><i class="fas fa-chart-bar btn-icon"></i> Statistiche</button>
      <button class="btn btn-secondary" id="resetBtn"><i class="fas fa-redo btn-icon"></i> Reset</button>
      <button class="btn btn-secondary" id="exportBtn"><i class="fas fa-download btn-icon"></i> Esporta</button>
      <button class="btn btn-secondary" id="importBtn"><i class="fas fa-upload btn-icon"></i> Importa</button>
      <input type="file" id="importFileInput" accept=".json" style="display:none" />
    </div>
  </div>
  <form class="add-category-form" id="addCategoryForm">
    <div class="input-group">
      <i class="fas fa-plus input-icon"></i>
      <input type="text" id="newCategoryName" class="form-input" placeholder="Nome nuova categoria..." autocomplete="off" />
    </div>
    <button type="submit" class="btn btn-primary"><i class="fas fa-folder-plus btn-icon"></i> Aggiungi</button>
  </form>
</div>

<div class="search-bar-wrap">
  <i class="fas fa-search search-icon"></i>
  <input type="text" class="search-input" id="searchInput" placeholder="Cerca una serie in tutte le categorie..." autocomplete="off" />
  <button class="search-clear" id="searchClear"><i class="fas fa-times"></i></button>
  <div class="search-results-info" id="searchResultsInfo" style="display:none"></div>
</div>

<div id="errorContainer"></div>
<div id="legendsContainer"></div>
<div class="categories" id="categoriesContainer"></div>

<button class="rating-fab" id="ratingFab" title="Valuta una serie a caso">
  <i class="fas fa-star"></i>
</button>
<div class="rating-fab-tooltip" id="ratingFabTooltip">Valuta serie casuale</div>

<script src="script.js"></script>
</body>
</html>
