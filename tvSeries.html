              const match = progressStr.match(/[\d.]+/);
              if (match) { views = parseFloat(match[0]); if (isNaN(views)) views = 1; }
            }
            if (excludeFutureCategory && isFutureCategory) {
              excludedShowsCount++;
            } else {
              categoryViews += views;
              totalViews += views;
              mostWatched.push({ title: show.title, views, category: category.name });
            }
          });

          if (!(excludeFutureCategory && isFutureCategory)) {
            categories.push({ name: category.name, showCount: categoryShows, totalViews: categoryViews });
          }
        });

        mostWatched.sort((a,b) => b.views - a.views);
        const adjustedTotalShows = excludeFutureCategory ? totalShows - excludedShowsCount : totalShows;

        return {
          totalShows: adjustedTotalShows,
          totalViews: Math.round(totalViews * 10) / 10,
          averageViews: adjustedTotalShows > 0 ? totalViews / adjustedTotalShows : 0,
          totalCategories: categories.length,
          categories, mostWatched,
        };
      }

      // ──────────────── STAMPA ────────────────
      document.getElementById('printListBtn').addEventListener('click', () => {
        let output = '', counter = 1;
        document.querySelectorAll('.category').forEach(catEl => {
          const catName = catEl.querySelector('.category-title').textContent.trim();
          const cards = catEl.querySelectorAll('.show-card');
          output += `${catName}\n${'='.repeat(catName.length)}\n\n`;
          cards.forEach(card => {
            const title = card.querySelector('.show-title').textContent.trim();
            const isLegend = card.dataset.isLegend === 'true';
            const progressEl = card.querySelector('.show-progress');
            const progress = progressEl ? progressEl.textContent.match(/[\d.,]+/)?.[0] || '' : '';
            const progText = progress ? ` — ${progress} volte` : progressEl && progressEl.textContent.includes('Da vedere') ? ' — Da vedere' : '';
            const legendMark = isLegend ? ' 👑' : '';
            if (isLegend) {
              output += `  👑 ${title}${progText}\n`;
            } else {
              output += `${counter}. ${title}${progText}\n`;
              counter++;
            }
          });
          output += '\n\n';
        });
        showPrintablePopup(output.trim());
      });

      function showPrintablePopup(text) {
        const popup = document.createElement('div');
        popup.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.92);backdrop-filter:blur(6px);display:flex;justify-content:center;align-items:center;z-index:9999;padding:20px;';

        const box = document.createElement('div');
        box.style.cssText = 'background:#111;padding:24px;border-radius:14px;width:90%;max-width:600px;max-height:80vh;overflow-y:auto;color:#fff;border:1px solid #222;box-shadow:0 20px 60px rgba(0,0,0,0.6);';

        const header = document.createElement('div');
        header.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #222;';

        const title = document.createElement('h3');
        title.textContent = 'Lista Serie TV';
        title.style.cssText = 'margin:0;color:var(--accent);font-family:var(--font-display);font-size:22px;letter-spacing:1px;';

        const buttonGroup = document.createElement('div');
        buttonGroup.style.cssText = 'display:flex;gap:10px;';

        const closeBtn = document.createElement('button');
        closeBtn.className = 'btn btn-secondary';
        closeBtn.textContent = 'Chiudi';
        closeBtn.onclick = () => popup.remove();

        const copyBtn = document.createElement('button');
        copyBtn.className = 'btn btn-primary';
        copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copia';
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(text);
          copyBtn.innerHTML = '<i class="fas fa-check"></i> Copiato!';
          copyBtn.disabled = true;
          setTimeout(() => { copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copia'; copyBtn.disabled = false; }, 2000);
        };

        const content = document.createElement('div');
        content.textContent = text;
        content.style.cssText = 'padding:14px;background:rgba(255,255,255,0.03);border-radius:8px;font-size:13px;font-family:monospace;white-space:pre-wrap;line-height:1.65;';

        buttonGroup.appendChild(copyBtn);
        buttonGroup.appendChild(closeBtn);
        header.appendChild(title);
        header.appendChild(buttonGroup);
        box.appendChild(header);
        box.appendChild(content);
        popup.appendChild(box);
        document.body.appendChild(popup);
      }

      // ──────────────── UTILS ────────────────
      function escapeHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      // ──────────────── AVVIO ────────────────
      (async () => {
        await initData();
        await render();
      })();
    </script>
  </body>
</html>
